<!DOCTYPE html>
<html>
<head>
    <title>Workspace Camera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #222; color: white; text-align: center; font-family: sans-serif; }
        video { width: 100%; max-width: 500px; border: 3px solid #444; border-radius: 10px; margin-top: 20px;}
        #status { margin-top: 20px; font-weight: bold; font-size: 20px; color: yellow; }
    </style>
</head>
<body>
    <h2>Exam Camera Active</h2>
    <p>Please place your phone so it can see your laptop screen and hands.</p>
    
    <video id="videoElement" autoplay playsinline muted></video>
    <div id="status">Waiting for Desktop to start exam...</div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const statusDiv = document.getElementById('status');
        
        let mediaRecorder;
        let recordedChunks = [];
        let isRecordingLocally = false;

        // Start checking the server status every 1 second
        setInterval(checkServerStatus, 1000);

        async function checkServerStatus() {
            try {
                let response = await fetch('/status');
                let data = await response.json();
                
                if (data.is_recording && !isRecordingLocally) {
                    startRecording();
                } else if (!data.is_recording && isRecordingLocally) {
                    stopAndUpload();
                }
            } catch (err) {
                console.log("Waiting for server...");
            }
        }

        async function startRecording() {
            try {
                // Get the back camera (environment)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", frameRate: { ideal: 30, max: 30 } }, 
                    audio: false 
                });
                
                videoElement.srcObject = stream;
                
                // Record locally in WebM format
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                
                mediaRecorder.ondataavailable = function(e) {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };
                
                mediaRecorder.start();
                isRecordingLocally = true;
                statusDiv.innerText = "🔴 RECORDING IN PROGRESS";
                statusDiv.style.color = "red";
                
            } catch (err) {
                alert("Camera access denied or failed: " + err);
            }
        }

        async function stopAndUpload() {
            isRecordingLocally = false;
            statusDiv.innerText = "Uploading secure video... Please wait.";
            statusDiv.style.color = "orange";
            
            mediaRecorder.stop();
            
            mediaRecorder.onstop = async () => {
                // Compile the chunks into one massive file
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const formData = new FormData();
                formData.append('video', blob, 'phone_video.webm');
                
                // Send it to the server
                try {
                    await fetch('/upload_video', {
                        method: 'POST',
                        body: formData
                    });
                    statusDiv.innerText = "✅ Upload Complete. You may close this tab.";
                    statusDiv.style.color = "#00FF00";
                    
                    // Turn off the camera
                    videoElement.srcObject.getTracks().forEach(track => track.stop());
                } catch (err) {
                    statusDiv.innerText = "❌ Upload Failed. Do not close tab.";
                    statusDiv.style.color = "red";
                }
                
                recordedChunks = [];
                mediaRecorder = null;
            };
        }
    </script>
</body>
</html>
